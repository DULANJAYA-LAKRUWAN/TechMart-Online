# =============================================================================
# TechMart Online — JMeter Performance Test Configuration
# =============================================================================
# Override via -J flag: jmeter -Jhost=staging.example.com -Jport=8080

# Target server
host=localhost
port=8080
protocol=http
basePath=/api

# Threading — Product browsing
browse.threads=20
browse.rampup=10
browse.duration=120
browse.loop=forever

# Threading — User operations
user.threads=10
user.rampup=5
user.duration=120
user.loop=forever

# Threading — Order placement
order.threads=5
order.rampup=10
order.duration=120
order.loop=forever

# Threading — Monitoring
monitor.threads=2
monitor.rampup=2
monitor.duration=120
monitor.loop=forever

# E2E flow
e2e.threads=3
e2e.rampup=3
e2e.loop=5

# Assertion thresholds
assertion.success=true
response.timeout.ms=5000
connect.timeout.ms=3000
